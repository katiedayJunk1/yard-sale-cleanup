<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Community Pickup - Sign Up</title>
 <style>
 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 }

 body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
 min-height: 100vh;
 display: flex;
 align-items: center;
 justify-content: center;
 padding: 20px;
 }

 .container {
 background: white;
 border-radius: 12px;
 box-shadow: 0 20px 60px rgba(0,0,0,0.3);
 max-width: 500px;
 width: 100%;
 padding: 40px;
 }

 .header {
 text-align: center;
 margin-bottom: 30px;
 }

 .header h1 {
 font-size: 28px;
 color: #333;
 margin-bottom: 10px;
 }

 .header p {
 color: #666;
 font-size: 16px;
 }

 .progress-section {
 margin-bottom: 30px;
 }

 .progress-label {
 display: flex;
 justify-content: space-between;
 font-size: 14px;
 color: #666;
 margin-bottom: 8px;
 }

 .progress-bar {
 width: 100%;
 height: 10px;
 background: #e0e0e0;
 border-radius: 10px;
 overflow: hidden;
 }

 .progress-fill {
 height: 100%;
 background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
 width: 40%;
 transition: width 0.3s ease;
 }

 .deadline {
 margin-top: 12px;
 padding: 12px;
 background: #fff3cd;
 border-left: 4px solid #ffc107;
 border-radius: 4px;
 font-size: 13px;
 color: #856404;
 }

 .form-group {
 margin-bottom: 20px;
 }

 label {
 display: block;
 margin-bottom: 6px;
 font-weight: 600;
 color: #333;
 font-size: 14px;
 }

 input, select, textarea {
 width: 100%;
 padding: 12px;
 border: 1px solid #ddd;
 border-radius: 6px;
 font-size: 14px;
 font-family: inherit;
 transition: border-color 0.3s;
 }

 input:focus, select:focus, textarea:focus {
 outline: none;
 border-color: #667eea;
 box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
 }

 textarea {
 resize: vertical;
 min-height: 80px;
 }

 .checkbox-group {
 display: flex;
 align-items: flex-start;
 gap: 10px;
 margin-bottom: 20px;
 }

 input[type="checkbox"] {
 width: 18px;
 height: 18px;
 margin-top: 2px;
 cursor: pointer;
 flex-shrink: 0;
 }

 .checkbox-label {
 font-size: 13px;
 color: #666;
 line-height: 1.4;
 margin: 0;
 }

 button {
 width: 100%;
 padding: 14px;
 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
 color: white;
 border: none;
 border-radius: 6px;
 font-size: 16px;
 font-weight: 600;
 cursor: pointer;
 transition: transform 0.2s, box-shadow 0.2s;
 }

 button:hover {
 transform: translateY(-2px);
 box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
 }

 button:active {
 transform: translateY(0);
 }

 button:disabled {
 opacity: 0.6;
 cursor: not-allowed;
 }

 .success-message {
 display: none;
 background: #d4edda;
 border: 1px solid #c3e6cb;
 color: #155724;
 padding: 16px;
 border-radius: 6px;
 margin-bottom: 20px;
 text-align: center;
 }

 .success-message.show {
 display: block;
 }

 .error-message {
 display: none;
 background: #f8d7da;
 border: 1px solid #f5c6cb;
 color: #721c24;
 padding: 12px;
 border-radius: 6px;
 margin-bottom: 20px;
 }

 .error-message.show {
 display: block;
 }
 </style>
</head>
<body>
 <div class="container">
 <div class="header">
 <h1> ♻️ Community Pickup</h1>
 <p>Reserve your spot</p>
 </div>
